<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sim.Viz replay -- __SCENARIO_NAME__</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #111318;
    color: #e8e8ea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }
  #canvasWrap {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
  }
  #cv {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    background: #1b1e26;
    cursor: grab;
  }
  #cv:active {
    cursor: grabbing;
  }
  #legend {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(20, 22, 28, 0.78);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    line-height: 1.6;
    max-width: 46vw;
    pointer-events: none;
  }
  #legend .row { display: flex; align-items: center; gap: 6px; }
  #legend .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex: none; }
  #caption {
    position: absolute;
    left: 8px;
    right: 8px;
    bottom: 8px;
    margin: 0 auto;
    max-width: 640px;
    background: rgba(20, 22, 28, 0.82);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    line-height: 1.4;
    pointer-events: none;
  }
  #caption .title { font-weight: 600; margin-right: 6px; }
  #vehCount {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(20, 22, 28, 0.78);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    pointer-events: none;
  }
  #hud {
    flex: none;
    background: #14161c;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  #hud button, #hud select {
    background: #262a34;
    color: #e8e8ea;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
  }
  #hud button:active { background: #33394a; }
  #hud .grow { flex: 1 1 160px; display: flex; align-items: center; gap: 8px; min-width: 140px; }
  #timeSlider { flex: 1 1 auto; width: 100%; }
  #timeReadout { white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 118px; }
  #hud label { display: flex; align-items: center; gap: 4px; font-size: 12px; opacity: 0.85; }
  .hud-row { display: flex; align-items: center; gap: 8px; width: 100%; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="stage">
  <div id="canvasWrap">
    <canvas id="cv"></canvas>
    <div id="legend"></div>
    <div id="vehCount">vehicles: 0</div>
    <div id="caption"></div>
  </div>
  <div id="hud">
    <div class="hud-row">
      <label id="sceneSelWrap">scene
        <select id="sceneSel"></select>
      </label>
      <button id="btnPlay">Pause</button>
      <button id="btnRestart">Restart</button>
      <label>speed
        <select id="speedSel">
          <option value="0.25">0.25x</option>
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
          <option value="4">4x</option>
          <option value="8">8x</option>
        </select>
      </label>
      <label><input type="checkbox" id="speedColorToggle"> color by speed</label>
      <span id="timeReadout">t = 0.0 s / 0.0 s</span>
    </div>
    <div class="hud-row">
      <input type="range" id="timeSlider" min="0" max="1" step="0.01" value="0">
    </div>
  </div>
</div>
<script>
const REPLAY_DATA = /*REPLAY_DATA*/;
</script>

</script>
</body>
</html>
